name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            asset: dist/lasso-typedb-2.25.6-win32.zip
          - os: ubuntu-latest
            platform: linux
            asset: dist/lasso-typedb-2.22.0-linux.tar.gz
          - os: macos-14
            platform: darwin
            asset: dist/lasso-typedb-2.22.0-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Verify package
        env:
          TARGET_PLATFORM: ${{ matrix.platform }}
        run: npm test

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: lasso-typedb-${{ matrix.platform }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Copy service manifest into release assets
        run: cp service.json release-assets/service.json

      - name: Generate release checksums
        run: |
          cd release-assets
          find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Compute release version
        id: release_version
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          release_version="$(date -u +'%Y.%-m.%-d')-${short_sha}"
          echo "value=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.value }}
          name: ${{ steps.release_version.outputs.value }}
          make_latest: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/service.json
            release-assets/SHA256SUMS.txt
